<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PatchBoards</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <div class="topbar">
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="2" width="6" height="6" rx="1.5" fill="#a78bfa"/>
            <rect x="10" y="2" width="6" height="6" rx="1.5" fill="#34d399"/>
            <rect x="2" y="10" width="6" height="6" rx="1.5" fill="#fb923c"/>
            <rect x="10" y="10" width="6" height="6" rx="1.5" fill="#60a5fa"/>
          </svg>
        </div>
        <div>
          <div class="logo-text">PatchBoards</div>
          <div class="logo-sub">Homebrew · winget · live scanning</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="btn" id="refreshBtn" onclick="App.fetchPackages()">↺ Refresh from system</button>
        <button class="btn primary" id="scanAllBtn" onclick="App.scanAll()">AI scan for CVEs</button>
      </div>
    </div>

    <!-- Server status banner -->
    <div id="serverBanner" class="banner banner-warn" style="display:none;">
      <strong>Local server not running.</strong>
      Run <code>./start.sh</code> (macOS/Linux) in your terminal to start it, then refresh this page.
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div id="scanProgressWrap" style="display:none;">
      <div class="scan-progress">
        <div class="scan-progress-bar" id="scanBar" style="width:0%"></div>
      </div>
    </div>

    <div class="scan-bar">
      <div class="scan-status" id="scanStatusText">
        <strong>Ready.</strong> Fetching packages from your system…
      </div>
      <div id="scanSpinner" class="spinner" style="display:none;"></div>
    </div>

    <div class="tab-nav">
      <button class="active" onclick="App.setTab('all', this)">All</button>
      <button onclick="App.setTab('action', this)">Needs action</button>
      <button onclick="App.setTab('security', this)">Security</button>
      <button onclick="App.setTab('ok', this)">Up to date</button>
      <button onclick="App.setTab('unscanned', this)">Unscanned</button>
    </div>

    <div class="section-header">
      <span class="section-title" id="sectionTitle">All packages</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="text" id="searchInput" placeholder="Filter packages…"
          style="font-size:13px;padding:5px 10px;border-radius:var(--radius-md);border:0.5px solid var(--border-2);background:var(--bg-secondary);color:var(--text);outline:none;width:180px;"
          oninput="App.renderList()" />
      </div>
    </div>

    <div class="pkg-list" id="pkgList"></div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
