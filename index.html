<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PatchBoards</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">

    <header class="topbar">
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="2" width="6" height="6" rx="1.5" fill="#60a5fa"/>
            <rect x="10" y="2" width="6" height="6" rx="1.5" fill="#f97316"/>
            <rect x="2" y="10" width="6" height="6" rx="1.5" fill="#4ade80"/>
            <rect x="10" y="10" width="6" height="6" rx="1.5" fill="#e879f9"/>
          </svg>
        </div>
        <div>
          <div class="logo-text">PatchBoards</div>
          <div class="logo-sub">Enterprise software release tracker · Mac &amp; Windows</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="refreshBtn" class="btn" onclick="App.fetchReleases()">↺ Refresh</button>
        <button class="btn primary" onclick="UI.openCatalog()">+ Browse Software</button>
      </div>
    </header>

    <div id="serverBanner" class="banner banner-warn" style="display:none"></div>

    <div id="statsGrid" class="stats-grid"></div>

    <div id="scanProgressWrap" class="scan-progress" style="display:none">
      <div id="scanBar" class="scan-progress-bar" style="width:0%"></div>
    </div>

    <div class="scan-bar">
      <div id="scanSpinner" class="spinner" style="display:none"></div>
      <div id="scanStatusText" class="scan-status">Loading…</div>
    </div>

    <div class="section-header">
      <span class="section-title" id="dashboardTitle">My Apps</span>
      <input type="text" id="searchInput" class="search-input" placeholder="Search…" oninput="App.render()">
    </div>

    <div id="emptyDashboard" class="empty-state" style="display:none">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No apps on your dashboard yet</div>
      <div class="empty-desc">Browse the software catalog to add apps your enterprise supports. New releases will appear here automatically.</div>
      <button class="btn primary" style="margin-top:1rem;" onclick="UI.openCatalog()">+ Browse Software Catalog</button>
    </div>

    <div id="appGrid" class="app-grid"></div>

  </div>

  <!-- Catalog slide-in panel -->
  <div id="catalogOverlay" class="catalog-overlay" style="display:none" onclick="UI.closeCatalogOnBg(event)">
    <div class="catalog-panel">
      <div class="catalog-header">
        <div>
          <h2 class="catalog-title">Software Catalog</h2>
          <p class="catalog-subtitle">Add apps to track Mac and Windows releases side-by-side</p>
        </div>
        <button class="btn catalog-close" onclick="UI.closeCatalog()">✕ Close</button>
      </div>
      <div class="catalog-search-row">
        <input type="text" id="catalogSearch" class="catalog-search" placeholder="Search software…" oninput="UI.renderCatalog()">
        <div id="platformFilter" class="platform-filter">
          <button class="pf-btn active" onclick="UI.setPlatformFilter('all', this)">All</button>
          <button class="pf-btn" onclick="UI.setPlatformFilter('mac', this)">🍎 Mac only</button>
          <button class="pf-btn" onclick="UI.setPlatformFilter('win', this)">🪟 Win only</button>
        </div>
      </div>
      <div id="categoryFilters" class="category-filters"></div>
      <div id="catalogGrid" class="catalog-grid"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/store.js"></script>
  <script src="js/fetcher.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
